<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Recipe</title>
    <link rel="stylesheet" type="text/css" href="addRecipe.css">
</head>
<body>
    <div id="navigationBar">
        <ul>
            <li><img src="logo.jpg" alt="Logo" style="height: 40px;"></li>
            <li><a href="text.html">Help</a></li>
        </ul>
    </div>

    <div class="container">
        <div id="topBar">
            <h2>Add Recipe</h2>
        </div>
        <form action="http://localhost/Projects/Recipes/add_recipe.php" method="post" enctype="multipart/form-data">
            <label for="recipe_name">Recipe Name</label>
            <input type="text" id="recipe_name" name="recipe_name" required>
            
            <label for="ingredients">Ingredients</label>
            <textarea id="ingredients" name="ingredients" required></textarea>

            <label for="recipe_image">Recipe Image</label>
            <input type="file" id="recipe_image" name="recipe_image" accept="image/*">

            <label for="repName">Recipe Owner username</label>
            <input type="text" id="repName" name="repName" required>

            <label for="instructions">Instructions</label>
            <textarea id="instructions" name="instructions"></textarea>

            <button type="submit">Submit Recipe</button>
        </form>
    </div>
</body>
</html>
